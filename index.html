<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Tick | Minimalist Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --primary: #000000;
            --secondary: #f5f5f7;
            --accent: #2ecc71; /* Farbe für besuchte Länder */
            --border: #e5e5e7;
            --font: 'Inter', -apple-system, sans-serif;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Start-Animation Screen */
        #splash {
            position: fixed; inset: 0; background: var(--primary); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: transform 0.8s var(--transition), opacity 0.6s ease;
        }
        #splash.hide { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .logo-box { width: 80px; height: 80px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; animation: draw 1.5s ease-out forwards; }
        .logo-check { font-size: 40px; color: #fff; opacity: 0; transform: scale(0.5); animation: appear 0.5s 0.8s forwards; }
        @keyframes draw { from { width: 0; height: 0; border-radius: 50%; } to { width: 80px; height: 80px; border-radius: 12px; } }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }

        /* UI Elements */
        .overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; padding: 20px; }
        .interactive { pointer-events: auto; }

        /* Top Header */
        .header { top: 0; display: flex; justify-content: space-between; align-items: flex-start; }
        .brand { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 16px; border: 1px solid var(--border); }
        .brand h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.5px; }
        .brand p { font-size: 12px; color: #666; }

        /* Stats Card */
        .stats-card { background: var(--primary); color: #fff; padding: 20px; border-radius: 20px; min-width: 140px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .stats-card .num { font-size: 32px; font-weight: 600; display: block; }
        .stats-card .label { font-size: 10px; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }

        /* Search Bar */
        .search-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; }
        .search-bar { width: 100%; background: #fff; border: 1px solid var(--border); padding: 15px 25px; border-radius: 30px; font-family: var(--font); font-size: 16px; outline: none; box-shadow: 0 4px 20px rgba(0,0,0,0.05); transition: var(--transition); }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 8px 30px rgba(0,0,0,0.1); }

        /* Map Styling */
        #map { width: 100%; height: 100%; background: #e0e0e0; }
        .leaflet-container { background: #f0f0f0 !important; }

        /* Country Styling */
        .country-style { fill-opacity: 0.2; fill: #666; color: #fff; weight: 1; opacity: 0.3; transition: var(--transition); }
        .country-visited { fill: var(--accent) !important; fill-opacity: 0.8 !important; opacity: 1 !important; weight: 2; }
        
        /* Custom Tooltip */
        .custom-tooltip { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 600; }

        /* Settings Toggle */
        .settings-btn { position: absolute; bottom: 40px; right: 20px; background: #fff; width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box"><span class="logo-check">✓</span></div>
        <div style="color:white; margin-top:20px; letter-spacing:4px; font-size:12px; font-weight:300;">TRAVEL TICK</div>
    </div>

    <div class="overlay header">
        <div class="brand interactive">
            <h1>Travel Tick</h1>
            <p id="continent-stats">Entdecke die Welt</p>
        </div>
        <div class="stats-card interactive">
            <span class="num" id="main-counter">0</span>
            <span class="label">Länder besucht</span>
            <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px;">
                <div id="progress-bar" style="width:0%; height:100%; background:var(--accent); border-radius:2px; transition: width 1s;"></div>
            </div>
        </div>
    </div>

    <div class="overlay search-container interactive">
        <input type="text" id="country-search" class="search-bar" placeholder="Land suchen...">
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /**
         * TRAVEL TICK - CORE ENGINE
         * Ein minimalistischer Tracker für Weltenbummler.
         */

        const state = {
            visited: new Set(JSON.parse(localStorage.getItem('tt_visited')) || []),
            geoData: null,
            map: null,
            layers: {}
        };

        // Initialisierung
        async function init() {
            setupMap();
            await loadGeoData();
            setupSearch();
            hideSplash();
            updateUI();
        }

        function setupMap() {
            state.map = L.map('map', {
                center: [20, 0],
                zoom: 3,
                zoomControl: false,
                attributionControl: false,
                maxBounds: [[-90, -180], [90, 180]]
            });

            // Heller, minimalistischer Kartenhintergrund
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(state.map);
        }

        async function loadGeoData() {
            try {
                // Wir laden echte Ländergrenzen (GeoJSON)
                const response = await fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson');
                state.geoData = await response.json();

                L.geoJSON(state.geoData, {
                    style: (feature) => ({
                        fillColor: state.visited.has(feature.properties.ADMIN) ? '#2ecc71' : '#bbbbbb',
                        weight: 1,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: state.visited.has(feature.properties.ADMIN) ? 0.8 : 0.2
                    }),
                    onEachFeature: (feature, layer) => {
                        const name = feature.properties.ADMIN;
                        state.layers[name.toLowerCase()] = layer;

                        layer.on({
                            mouseover: (e) => {
                                if(!state.visited.has(name)) {
                                    e.target.setStyle({ fillOpacity: 0.5, fillColor: '#000' });
                                }
                            },
                            mouseout: (e) => {
                                if(!state.visited.has(name)) {
                                    e.target.setStyle({ fillOpacity: 0.2, fillColor: '#bbbbbb' });
                                }
                            },
                            click: () => toggleCountry(name)
                        });

                        layer.bindTooltip(name, { sticky: true, className: 'custom-tooltip' });
                    }
                }).addTo(state.map);
            } catch (error) {
                console.error("GeoData konnte nicht geladen werden:", error);
            }
        }

        function toggleCountry(name) {
            if (state.visited.has(name)) {
                state.visited.delete(name);
            } else {
                state.visited.add(name);
            }
            
            saveState();
            renderMapUpdate();
            updateUI();
        }

        function renderMapUpdate() {
            // Wir gehen durch alle Layer und aktualisieren das Design
            Object.keys(state.layers).forEach(key => {
                const layer = state.layers[key];
                const name = layer.feature.properties.ADMIN;
                const isVisited = state.visited.has(name);

                layer.setStyle({
                    fillColor: isVisited ? '#2ecc71' : '#bbbbbb',
                    fillOpacity: isVisited ? 0.8 : 0.2
                });
            });
        }

        function setupSearch() {
            const input = document.getElementById('country-search');
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const layer = state.layers[query];
                if (layer) {
                    state.map.flyTo(layer.getBounds().getCenter(), 5);
                }
            });
        }

        function updateUI() {
            const count = state.visited.size;
            const total = 255; // Anzahl in der GeoJSON
            const percent = (count / total) * 100;

            document.getElementById('main-counter').innerText = count;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            const statsText = count === 0 ? "Fange an zu reisen!" : `${Math.round(percent)}% der Welt erkundet`;
            document.getElementById('continent-stats').innerText = statsText;
        }

        function saveState() {
            localStorage.setItem('tt_visited', JSON.stringify([...state.visited]));
        }

        function hideSplash() {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hide');
            }, 2500);
        }

        // App Start
        init();
    </script>
</body>
</html>
